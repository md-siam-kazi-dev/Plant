<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <h1 class=" text-4xl font-bold mx-auto">Chose tree</h1>
    
    <div class="parent-container justify-between flex flex-col lg:flex-row gap-2 mx-auto w-full lg:w-9/10 max-w-[1400px]">
            <div id="category" class="sticky rounded-md p-5 bg-white"></div>


        <div class="flex-1  mx-auto">
            <div id="plant-container" class="plant-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5 w-full">
            </div>

            <!-- loding div  -->
            <div class="loading h-full  mx-auto flex justify-center items-center">
                <span class="loading loading-dots loading-xl mx-auto"></span>

            </div>
        </div>
            


            <div id="cart-container" ></div>
    </div>
    <dialog id="plant_modal" class="modal">
  <div class="modal-box max-w-xl">

    <!-- Header -->
    <div class="flex justify-between items-center">
      <h3 id="modal-title" class="text-2xl font-bold text-emerald-700">
        Jackfruit Tree
      </h3>

      <form method="dialog">
        <button class="text-xl">✕</button>
      </form>
    </div>

    <!-- Image -->
    <img 
      id="modal-image"
      src="jackfruit.jpg"
      class="mt-4 w-full h-64 object-cover rounded-lg"
    />

    <!-- Category -->
    <div class="mt-5 flex items-center gap-2">
      <span class="text-gray-600 font-semibold">Category:</span>
      <span 
        id="modal-category"
        class="bg-indigo-500 text-white text-sm px-3 py-1 rounded-full"
      >
        Fruit Tree
      </span>
    </div>

    <!-- Description -->
    <p id="modal-description" class="mt-3 text-gray-600">
      A large tropical tree that bears the world’s biggest fruit, the jackfruit.
      Its sweet and aromatic flesh is both nutritious and filling.
    </p>

    <!-- Price -->
    <div class="mt-5 text-3xl font-bold text-green-600" id="modal-price">
      $800
    </div>

    <!-- Footer -->
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>

  </div>
</dialog>
    
    <script src="./script/renderPlant.js"></script>
    <script src="./script/renderCatagory.js"></script>
    <script src="./script/renderCart.js"></script>
    <script src="./script/mac.js"></script>
    <script src="./script/main.js"></script>
</body>
</html>
